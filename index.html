<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>共有ページ一覧</title>
  <style>
    :root {
      --bg: #f4f7f1;
      --card: rgba(255,255,255,.9);
      --line: #d7ded1;
      --text: #18211b;
      --muted: #617061;
      --accent: #1f6a4a;
      --shadow: 0 20px 48px rgba(18, 31, 22, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px 14px 48px;
      background:
        radial-gradient(circle at top left, rgba(31, 106, 74, .08), transparent 34%),
        linear-gradient(180deg, #fbfcf9 0%, var(--bg) 100%);
      color: var(--text);
      font: 15px/1.7 -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }
    .hero {
      padding: 28px 22px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(250,252,248,.96));
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 8vw, 52px);
      line-height: 1.04;
      letter-spacing: -.04em;
    }
    .lead {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
    }
    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr;
    }
    .card {
      padding: 20px 18px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--card);
      box-shadow: var(--shadow);
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -.03em;
    }
    .meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .summary {
      margin: 0;
      color: var(--text);
    }
    .footer {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
    code {
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(31, 106, 74, .08);
      color: var(--accent);
    }
    .empty {
      padding: 24px 18px;
      border: 1px dashed var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,.72);
      color: var(--muted);
    }
    @media (min-width: 720px) {
      body { padding: 28px 22px 64px; font-size: 16px; }
      .hero { padding: 34px 30px; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .footer { flex-direction: row; justify-content: space-between; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <p class="eyebrow">Public Pages</p>
      <h1>共有ページ一覧</h1>
      <p class="lead">LP、修正ガイド、確認メモなどを、そのままURLで共有するための公開ページ置き場です。公開元は cursor 側のソースHTMLで管理し、ここは配信用の箱として使います。</p>
    </section>
    <section class="grid">
      
            <article class="card">
              <p class="meta">slug: <code>stopped-line-link-guide</code></p>
              <h2>停止中LINE誤接続 修正ガイド</h2>
              <p class="summary">Mailchimp、UTAGE、LINEの誤接続を修正担当者向けに整理した公開ページ</p>
              <div class="footer">
                <span>最終更新: 2026-03-09 04:13:27+09:00</span>
                <a href="https://koa800.github.io/share-pages/stopped-line-link-guide/">ページを開く</a>
              </div>
            </article>
            
    </section>
  </div>
</body>
</html>
